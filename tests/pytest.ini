[pytest]
# Pytest configuration for Precision AgriAI testing

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Python path
pythonpath = .

# Asyncio mode
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for service coordination
    property: Property-based tests using Hypothesis
    slow: Tests that take longer to run
    aws: Tests that require AWS service mocking
    dynamodb: Tests that use DynamoDB
    bedrock: Tests that use AWS Bedrock
    sns: Tests that use AWS SNS
    voice: Tests that use AWS Polly/Transcribe

# Coverage options
addopts =
    -ra
    -q
    --strict-markers
    --cov=services
    --cov=config
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --tb=short
    --disable-warnings

# Hypothesis settings
hypothesis-profile = default
hypothesis-verbosity = normal
hypothesis-seed = None

# Timeout for tests (in seconds)
timeout = 300

# Minimum Python version
minversion = 7.0

# Log settings
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
